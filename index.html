<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440, initial-scale=1.0" />
  <title>APK Manager — Hydrogen Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app" id="app">

  <!-- SIDEBAR NAVIGATION -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">A</div>
      <div>
        <div class="brand-text">APK Manager</div>
        <div class="brand-sub">Hydrogen / TMS</div>
      </div>
    </div>

    <div class="nav-section-label">Main</div>
    <div class="nav-item active" data-screen="s1">
      <svg class="dot" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1" fill="currentColor"/><rect x="2" y="9" width="5" height="5" rx="1" fill="currentColor"/><rect x="9" y="9" width="5" height="5" rx="1" fill="currentColor"/></svg>
      Dashboard
    </div>
    <div class="nav-item" data-screen="s2">
      <svg class="dot" viewBox="0 0 16 16" fill="none"><path d="M3 3h10v4H3zM3 9h10v4H3z" stroke="currentColor" stroke-width="1.4"/></svg>
      APK Registry
    </div>
    <div class="nav-item" data-screen="s3">
      <svg class="dot" viewBox="0 0 16 16" fill="none"><path d="M8 1.5v9M4.5 7L8 10.5 11.5 7M2 13.5h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Versions
    </div>
    <div class="nav-item" data-screen="s4">
      <svg class="dot" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="8" rx="1" stroke="currentColor" stroke-width="1.4"/><path d="M5 14h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Terminals
    </div>
    <div class="nav-item" data-screen="s5">
      <svg class="dot" viewBox="0 0 16 16" fill="none"><path d="M10 6a2 2 0 11-4 0 2 2 0 014 0zM8 8v5M6 11h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Key Exchange
    </div>
    <div class="nav-item" data-screen="s6">
      <svg class="dot" viewBox="0 0 16 16" fill="none"><path d="M2 13V3M2 13h12M5 10V6M8 10V4M11 10V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Distribution
    </div>
    <div class="nav-item" data-screen="s7">
      <svg class="dot" viewBox="0 0 16 16" fill="none"><path d="M3 3v10h10M6 9l2-2 2 2 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Monitoring
    </div>
    <div class="nav-item" data-screen="s8">
      <svg class="dot" viewBox="0 0 16 16" fill="none"><circle cx="5" cy="6" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="6" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-1.5 1.5-3 3-3s3 1.5 3 3M8 13c0-1.5 1.5-3 3-3s3 1.5 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Buckets
    </div>

    <div class="nav-footer">
      <div class="nav-avatar">OM</div>
      <div>
        <div class="who">Opeyemi M.</div>
        <div class="who-sub">TMS Admin</div>
      </div>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-title"><b id="topTitle">Dashboard</b> · <span id="topSub">POS APK Management & Distribution</span></div>
      <div class="topbar-right">
        <input class="topbar-search" id="globalSearchInput" placeholder="Search APKs, terminals, versions…" readonly />
        <button class="icon-btn" aria-label="Notifications" id="notifBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2a6 6 0 00-6 6v4l-2 3h16l-2-3V8a6 6 0 00-6-6zM9 19a3 3 0 006 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <span class="badge"></span>
        </button>
        <button class="icon-btn" aria-label="Help">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M9.5 9.5a2.5 2.5 0 115 0c0 1.5-2.5 2-2.5 3.5M12 17h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <div class="top-avatar">OM</div>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Screens injected by app.js -->
    </div>
  </main>

</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script type="module" src="app.js"></script>
</body>
</html>
